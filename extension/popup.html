<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 14px;
        width: 260px;
        background: #0f0f0f;
        color: #f1f1f1;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #4caf50;
      }
      .dot.off {
        background: #666;
      }
      p {
        font-size: 12px;
        color: #aaa;
        margin: 0 0 12px;
        line-height: 1.4;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .note {
        margin-top: 12px;
        font-size: 11px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <h1><span class="dot" id="dot"></span> YT Ads Shield</h1>
    <p>
      Блокирует рекламные запросы внутри <strong>YouTube embed</strong> на
      localhost/ngrok и на youtube.com. API-ключи не нужны.
    </p>
    <label>
      <input type="checkbox" id="enabled" checked />
      Блокировать рекламу
    </label>
    <p class="note">
      После переключения вкладка плеера обновится. YouTube регулярно меняет
      рекламный плеер, поэтому расширение нужно держать актуальным.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
